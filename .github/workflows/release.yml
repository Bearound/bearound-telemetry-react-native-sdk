name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Guard: the pushed tag (vX.Y.Z) must match package.json version, so an
      # npm publish can never ship under a version the git tag doesn't claim.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Tag version:    $TAG"
          echo "package.json:   $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump package.json (and the CHANGELOG) before tagging."
            exit 1
          fi
          echo "✅ Tag matches package.json ($PKG)"

      - name: Verify changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## ${TAG}" CHANGELOG.md; then
            echo "::error::Version ${TAG} not found in CHANGELOG.md"
            exit 1
          fi
          echo "✅ CHANGELOG.md is up to date"

      - name: Validate native Android pin exists on JitPack
        run: |
          set -euo pipefail
          NATIVE_VERSION=$(grep -oE "com\.github\.Bearound:bearound-telemetry-android-sdk:[0-9A-Za-z.\-]+" android/build.gradle | head -1 | sed -E 's/.*bearound-telemetry-android-sdk://')
          POM_URL="https://jitpack.io/com/github/Bearound/bearound-telemetry-android-sdk/${NATIVE_VERSION}/bearound-telemetry-android-sdk-${NATIVE_VERSION}.pom"
          echo "Validating native pin ${NATIVE_VERSION}"
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null "$POM_URL"; then
              echo "✅ JitPack POM available"; exit 0
            fi
            echo "Attempt $i/5: POM not available yet. Waiting 30s…"; sleep 30
          done
          echo "❌ ${NATIVE_VERSION} POM not found on JitPack"; exit 1

      - name: Verify npm identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
