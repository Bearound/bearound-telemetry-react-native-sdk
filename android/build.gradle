buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0")
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.bearoundtelemetry"

    compileSdk = 36

    defaultConfig {
        minSdk = 26
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

repositories {
    google()
    mavenCentral()
    maven { url = uri("https://jitpack.io") }
}

dependencies {
    implementation "com.facebook.react:react-android"

    // Published native Bearound Telemetry SDK — beacon-hardware telemetry with no
    // location permission. The tracking SDK is NOT a dependency: the companion
    // handoff is resolved reflectively at runtime when it is present in the app.
    api "com.github.Bearound:bearound-telemetry-android-sdk:v0.2.0"
}
